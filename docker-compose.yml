version: "3.8"

services:
  database:
    image: postgres:15-alpine
    container_name: assam_bazar_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assam_bazar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: assam_bazar_redis
    restart: always
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: assam_bazar_es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  backend:
    build: ./backend
    container_name: assam_bazar_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=database
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=assam_bazar
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "5000:5000"
    depends_on:
      - database
      - redis
      - elasticsearch

  frontend:
    build: ./frontend
    container_name: assam_bazar_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: assam_bazar_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
